# Generated starter config — after `fly launch`, fly will rewrite the `app`
# name and region for you; the rest can stay as-is.
app = "catmagochi-relay"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[[mounts]]
  source = "catmagochi_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
