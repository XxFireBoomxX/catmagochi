<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Send to Catmagochi</title>
<style>
  :root {
    --bg: #0b0614;
    --bg-panel: #150c26;
    --text: #c9a6ff;
    --text-soft: #8a6bb0;
    --card: #120a1f;
    --border: #7c4dff;
    --primary: #b388ff;
    --glow: rgba(179, 136, 255, 0.55);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: 1.5rem;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 1.5rem;
    box-shadow: 0 0 24px var(--glow);
    text-align: center;
  }
  h1 {
    margin: 0 0 1rem;
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    text-shadow: 0 0 8px var(--glow);
  }
  textarea {
    width: 100%;
    min-height: 6rem;
    resize: vertical;
    font: inherit;
    padding: 0.7rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  button {
    width: 100%;
    font: inherit;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 0.7rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--border); color: var(--bg); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { min-height: 1.4em; margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-soft); }
  .status.ok { color: #6fe08a; }
  .status.err { color: #ff5d8f; }
</style>
</head>
<body>
  <div class="card">
    <h1>Send to Catmagochi</h1>
    <textarea id="text" maxlength="500" placeholder="Say something sweet..."></textarea>
    <button id="send">[ SEND ]</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    // Fill these in once, after deploying server/ (see server/README.md).
    const RELAY_URL = 'https://your-app-name.fly.dev'
    const RELAY_TOKEN = 'your-relay-token'

    const textEl = document.getElementById('text')
    const sendEl = document.getElementById('send')
    const statusEl = document.getElementById('status')

    sendEl.addEventListener('click', async () => {
      const text = textEl.value.trim()
      if (!text) return
      sendEl.disabled = true
      statusEl.textContent = 'sending...'
      statusEl.className = 'status'
      try {
        const res = await fetch(`${RELAY_URL}/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: RELAY_TOKEN, text }),
        })
        if (!res.ok) throw new Error((await res.json()).error || 'failed')
        textEl.value = ''
        statusEl.textContent = 'sent!'
        statusEl.className = 'status ok'
      } catch (err) {
        statusEl.textContent = 'failed: ' + err.message
        statusEl.className = 'status err'
      } finally {
        sendEl.disabled = false
      }
    })
  </script>
</body>
</html>
